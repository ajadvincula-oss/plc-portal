<!DOCTYPE html>
<html>

<head>

<title>PLC Employee Portal</title>


<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
margin:0;
width:100%;
min-height:100%;
}


/* LOGIN DESIGN */


.loginPage{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#004aad,#00b4d8);

}


.loginBox{

background:white;
width:420px;
padding:45px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,.25);
text-align:center;

}


.loginIcon{

font-size:55px;

}


h2{

letter-spacing:3px;

}


input{

width:100%;
padding:16px;
margin:12px 0;
border-radius:12px;
border:1px solid #ccc;
font-size:18px;

}


button{

padding:15px 35px;
border:0;
border-radius:12px;
cursor:pointer;
font-size:17px;
color:white;
background:#0057d9;
margin-top:10px;

}


.adminBtn{

background:#222;

}


/* DASHBOARD */

.dashboard{

display:none;
padding:40px;

}


.card{

background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px #ddd;

}


</style>

</head>



<body>



<!-- EMPLOYEE LOGIN -->


<div class="loginPage" id="loginPage">

<div class="loginBox">


<div class="loginIcon">
👤
</div>


<h2>
Employee Portal
</h2>


<input id="username" placeholder="Username">

<input id="pin" placeholder="PIN">


<button onclick="login()">
LOGIN
</button>


<br><br>


<button class="adminBtn" onclick="showAdminLogin()">
HR ADMIN LOGIN
</button>


</div>

</div>





<!-- HR LOGIN -->


<div class="loginPage" id="adminLoginPage" style="display:none;">


<div class="loginBox">


<div class="loginIcon">
🛡
</div>


<h2>
HR Admin Portal
</h2>


<input id="adminUser" placeholder="Admin Username">

<input id="adminPass" placeholder="Password">


<button onclick="adminLogin()">
LOGIN
</button>


<br><br>


<button class="adminBtn" onclick="backEmployee()">
BACK TO EMPLOYEE LOGIN
</button>


</div>

</div>





<!-- EMPLOYEE DASHBOARD -->


<div class="dashboard" id="dashboard">


<h1>
PLC EMPLOYEE DASHBOARD
</h1>


<div class="card">

<h2>
Welcome Employee
</h2>


<p>
Employee portal successfully loaded.
</p>


</div>

</div>






<!-- HR DASHBOARD -->


<div class="dashboard" id="hrDashboard">


<h1>
HR ADMIN DASHBOARD
</h1>


<div class="card">


<h2>
Welcome HR Admin
</h2>


<p>
HR Management Panel Loaded.
</p>


</div>


</div>








<script>


const API_URL="https://script.google.com/macros/s/AKfycbzOhTHL9eSvXiZBtFNOOqSklkkelcPORIsBMYuWPZyPrqktTXFb6at4WrrYpi1T_e7FaA/exec";




// EMPLOYEE LOGIN


function login(){


let username=document.getElementById("username").value.trim();

let pin=document.getElementById("pin").value.trim();



if(username=="" || pin==""){

alert("Please enter username and PIN");

return;

}




fetch(API_URL,{

method:"POST",

body:JSON.stringify({

action:"login",

username:username,

pin:pin,

deviceID:navigator.userAgent

})

})


.then(res=>res.json())


.then(data=>{


console.log(data);


if(data.result=="SUCCESS"){


document.getElementById("loginPage").style.display="none";

document.getElementById("dashboard").style.display="block";


}


else{


alert(data.error || "Invalid Login");


}



})


.catch(error=>{


alert("Connection Error. Check Apps Script.");

console.log(error);


});


}








// OPEN HR LOGIN


function showAdminLogin(){


document.getElementById("loginPage").style.display="none";

document.getElementById("adminLoginPage").style.display="flex";


}





// BACK EMPLOYEE LOGIN


function backEmployee(){


document.getElementById("adminLoginPage").style.display="none";

document.getElementById("loginPage").style.display="flex";


}







// HR LOGIN


function adminLogin(){


let user=document.getElementById("adminUser").value;

let pass=document.getElementById("adminPass").value;



if(user=="admin" && pass=="123456"){


document.getElementById("adminLoginPage").style.display="none";

document.getElementById("hrDashboard").style.display="block";


}


else{


alert("Invalid HR Login");


}


}



</script>



</body>

</html>
