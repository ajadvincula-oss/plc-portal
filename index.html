<!DOCTYPE html>
<html>
<head>

<title>PLC Employee Portal</title>

<style>

*{
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

html,body{
  margin:0;
  width:100%;
  min-height:100%;
}

/* LOGIN PAGE */

.loginPage{

  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background:linear-gradient(
    135deg,
    #004aad,
    #00b4d8
  );

}


.loginBox{

  background:white;
  width:420px;
  padding:45px;
  border-radius:25px;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
  text-align:center;

}


.loginIcon{

  font-size:55px;

}


h2{

  letter-spacing:2px;

}


input{

  width:100%;
  padding:16px;
  margin:12px 0;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:18px;

}


button{

  padding:15px 35px;
  border:0;
  border-radius:12px;
  cursor:pointer;
  font-size:17px;
  color:white;
  background:#0057d9;
  margin-top:10px;

}


.adminBtn{

 background:#222;

}


/* DASHBOARD */

.dashboard{

 display:none;
 padding:40px;

}


.card{

 background:white;
 padding:30px;
 border-radius:20px;
 box-shadow:0 10px 30px #ddd;

}


</style>

</head>


<body>


<!-- LOGIN -->

<div class="loginPage" id="loginPage">


<div class="loginBox">


<div class="loginIcon">
👤
</div>


<h2>Employee Portal</h2>


<input placeholder="Username">

<input placeholder="PIN">


<button onclick="login()">
LOGIN
</button>

<br><br>


<button class="adminBtn">
HR ADMIN LOGIN
</button>


</div>

</div>




<!-- DASHBOARD -->

<div class="dashboard" id="dashboard">


<h1>
🛡 PLC EMPLOYEE DASHBOARD
</h1>


<div class="card">

<h2>Welcome Employee</h2>

<p>
Portal successfully loaded from GitHub Pages.
</p>

</div>


</div>





<script>


function login(){


document.getElementById("loginPage").style.display="none";


document.getElementById("dashboard").style.display="block";


}


</script>



</body>
</html>
