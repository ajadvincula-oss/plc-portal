<!DOCTYPE html>
<html>

<head>

<title>PLC Employee Portal</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
background:#f4f6f9;
}


/* =====================
LOGIN DESIGN
===================== */


.loginPage{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
135deg,
#004aad,
#00b4d8
);

}


.loginBox{

background:white;
width:430px;
padding:45px;
border-radius:25px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.25);

}


.icon{

font-size:55px;

}


h2{

letter-spacing:4px;

}


input{

width:100%;
padding:15px;
margin:12px 0;
font-size:17px;
border-radius:12px;
border:1px solid #ccc;

}


button{

padding:14px 35px;
border:0;
border-radius:12px;
background:#0057d9;
color:white;
cursor:pointer;
font-size:16px;
margin:5px;

}


.adminBtn{

background:#222;

}



.backBtn{

background:#777;

}



/* =====================
DASHBOARD
===================== */


.dashboard{

display:none;
height:100vh;

}



.sidebar{

width:260px;
height:100vh;
background:#003566;
color:white;
float:left;
padding:25px;

}



.sidebar h2{

font-size:20px;

}



.menu{

padding:15px;
cursor:pointer;
border-bottom:1px solid rgba(255,255,255,.2);

}



.menu:hover{

background:#0057d9;

}




.content{

margin-left:260px;
padding:40px;

}



.card{

background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px #ddd;
margin-bottom:20px;

}


table{

width:100%;
border-collapse:collapse;

}


td,th{

padding:12px;
border-bottom:1px solid #ddd;

}

<!-- =====================
EMPLOYEE LOGIN
===================== -->

<div class="loginPage" id="loginPage">

<div class="loginBox">

<div class="icon">
👤
</div>

<h2>
Employee Portal
</h2>


<input id="username" placeholder="Username">

<input id="pin" placeholder="PIN" type="password">


<button onclick="employeeLogin()">
LOGIN
</button>


<br><br>


<button class="adminBtn" onclick="showAdminLogin()">
HR ADMIN LOGIN
</button>


</div>

</div>






<!-- =====================
HR ADMIN LOGIN
===================== -->


<div class="loginPage" id="adminLoginPage" style="display:none;">


<div class="loginBox">


<div class="icon">
🛡
</div>


<h2>
HR Admin Portal
</h2>


<input id="adminUser" placeholder="Admin Username">


<input id="adminPass" placeholder="Password" type="password">


<button onclick="adminLogin()">
LOGIN
</button>


<br>


<button class="backBtn" onclick="backEmployee()">
BACK TO EMPLOYEE
</button>


</div>

</div>

</style>

</head>





<!-- =====================
EMPLOYEE DASHBOARD
===================== -->


<div class="dashboard" id="employeeDashboard">


<div class="sidebar">


<h2>
EMPLOYEE
</h2>


<div class="menu" onclick="showPage('profile')">
👤 Profile
</div>


<div class="menu" onclick="showPage('leave')">
🏖 Leave
</div>


<div class="menu" onclick="showPage('cash')">
💰 Cash Advance
</div>


<div class="menu" onclick="showPage('medical')">
💉 Medical
</div>


<div class="menu" onclick="showPage('evaluation')">
⭐ Evaluation
</div>


<div class="menu" onclick="showPage('violation')">
⚠ Violation
</div>


<div class="menu" onclick="logout()">
🚪 Logout
</div>


</div>





<div class="content">


<h1 id="welcomeName">
Welcome Employee
</h1>



<div class="card" id="profile">

<h2>Profile</h2>

<p id="profileData">
Loading...
</p>

</div>




<div class="card" id="leave">

<h2>Leave Records</h2>

<table id="leaveTable">

</table>

</div>





<div class="card" id="cash">

<h2>Cash Advance</h2>

<table id="cashTable">

</table>

</div>





<div class="card" id="medical">

<h2>Medical Records</h2>

<table id="medicalTable">

</table>

</div>





<div class="card" id="evaluation">

<h2>Evaluation</h2>

<table id="evaluationTable">

</table>

</div>





<div class="card" id="violation">

<h2>Violations</h2>

<table id="violationTable">

</table>

</div>



</div>


</div>


<!-- =====================
HR ADMIN DASHBOARD
===================== -->

<div class="dashboard" id="adminDashboard">


<div class="sidebar">

<h2>
HR ADMIN
</h2>


<div class="menu">
👥 Employees
</div>


<div class="menu" onclick="logout()">
🚪 Logout
</div>


</div>



<div class="content">


<h1>
HR ADMIN DASHBOARD
</h1>


<div class="card">


<h2>
Employee Management
</h2>


<table id="employeeList">

</table>


</div>


</div>


</div>





<script>


const API_URL =
"https://script.google.com/macros/s/AKfycbzOhTHL9eSvXiZBtFNOOqSklkkelcPORIsBMYuWPZyPrqktTXFb6at4WrrYpi1T_e7FaA/exec";



let currentEmployee="";



// =====================
// EMPLOYEE LOGIN
// =====================


function employeeLogin(){


let username =
document.getElementById("username").value;


let pin =
document.getElementById("pin").value;



fetch(API_URL,{

method:"POST",

body:JSON.stringify({

action:"login",

username:username,

pin:pin,

deviceID:navigator.userAgent

})

})


.then(r=>r.json())


.then(data=>{


if(data.result=="SUCCESS"){


currentEmployee=data.employeeID;


document.getElementById("loginPage").style.display="none";


document.getElementById("employeeDashboard").style.display="block";


document.getElementById("welcomeName").innerHTML =
"Welcome " + data.name;


loadEmployeeData();


}else{


alert(data.error || "Invalid Login");


}


});


}







// =====================
// LOAD EMPLOYEE DATA
// =====================


function loadEmployeeData(){


document.getElementById("profileData").innerHTML =
"Employee ID: "+currentEmployee;


}







// =====================
// ADMIN LOGIN PAGE SWITCH
// =====================


function showAdminLogin(){


document.getElementById("loginPage").style.display="none";


document.getElementById("adminLoginPage").style.display="flex";


}




function backEmployee(){


document.getElementById("adminLoginPage").style.display="none";


document.getElementById("loginPage").style.display="flex";


}







// =====================
// ADMIN LOGIN
// =====================


function adminLogin(){



let username =
document.getElementById("adminUser").value;



let password =
document.getElementById("adminPass").value;




fetch(API_URL,{

method:"POST",

body:JSON.stringify({

action:"adminLogin",

username:username,

password:password

})

})

.then(r=>r.json())


.then(data=>{


if(data.result=="SUCCESS"){



document.getElementById("adminLoginPage").style.display="none";


document.getElementById("adminDashboard").style.display="block";


}else{


alert(data.error || "Invalid Admin Login");


}


});


}








// =====================
// MENU SWITCH
// =====================


function showPage(id){



let cards =
document.querySelectorAll(".card");


cards.forEach(c=>{

c.style.display="none";

});


document.getElementById(id).style.display="block";


}






// =====================
// LOGOUT
// =====================


function logout(){


location.reload();


}



</script>


</body>


</html>

<body>
